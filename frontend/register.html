<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | المنصة الطبية</title>
  
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sys-spacing-24);
      background: var(--sys-color-surface-container-lowest);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--sys-spacing-32);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="auth-container mt-4">
    <div class="card auth-card glass-panel">
      <div class="auth-header">
        <div style="font-size: 3rem; color: var(--sys-color-primary); margin-bottom: 16px;">
          <i class="ph-fill ph-user-plus"></i>
        </div>
        <h1 class="headline-md">إنشاء حساب جديد</h1>
        <p class="body-md">انضم إلى مجتمعنا الصحي الآن</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name" class="form-label">الاسم الكامل</label>
          <input type="text" id="name" class="form-control" placeholder="أدخل اسمك الكريم" required>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-control" placeholder="أدخل بريدك الإلكتروني" required>
        </div>
        
        <div class="form-group mb-4">
          <label for="password" class="form-label">كلمة المرور</label>
          <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="btnRegister">
          إنشاء الحساب
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="body-md">لديك حساب بالفعل؟ <a href="login.html" style="color: var(--sys-color-primary); font-weight: 600; text-decoration: none;">سجل دخولك</a></p>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./components/navbar.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
