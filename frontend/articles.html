<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الموثوقة | المنصة الطبية</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/articles.css">

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a237e">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>
    <div id="navbar-container"></div>
    
    <main class="page-content container flex-container">
        <!-- Header Section -->
        <header class="section-header text-center">
            <h1 class="display-title">المقالات الطبية والموثوقة</h1>
            <p class="body-text text-muted" style="max-width: 600px; margin: 0 auto;">نخبة من المقالات المكتوبة والمراجعة طبياً من قبل أطباء مختصين لرفع مستوى الوعي والثقافة الصحية للمجتمع.</p>
        </header>

        <!-- Articles Grid Container -->
        <div id="articles-grid" class="articles-grid">
            <!-- Loading state -->
            <div class="loading-state">
                <i class="ph ph-spinner ph-spin"></i>
                <p>جاري تحميل المقالات...</p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="js/articles.js"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('Service Worker registered!', reg);
          }).catch(err => {
            console.log('Service Worker registration failed: ', err);
          });
        });
      }
    </script>

</body>
</html>
