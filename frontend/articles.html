<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الموثوقة | المنصة الطبية</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/articles.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <main class="page-content container flex-container">
        <!-- Header Section -->
        <header class="section-header text-center">
            <h1 class="display-title">المقالات الطبية والموثوقة</h1>
            <p class="body-text text-muted" style="max-width: 600px; margin: 0 auto;">نخبة من المقالات المكتوبة والمراجعة طبياً من قبل أطباء مختصين لرفع مستوى الوعي والثقافة الصحية للمجتمع.</p>
        </header>

        <!-- Articles Grid Container -->
        <div id="articles-grid" class="articles-grid">
            <!-- Loading state -->
            <div class="loading-state">
                <i class="ph ph-spinner ph-spin"></i>
                <p>جاري تحميل المقالات...</p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="js/articles.js"></script>
</body>
</html>
