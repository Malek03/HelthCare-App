<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلب انضمام كطبيب | المنصة الطبية</title>
  
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    .join-container {
      padding: var(--sys-spacing-88) var(--sys-spacing-24);
      background: var(--sys-color-surface-container-lowest);
      min-height: calc(100vh - 80px); /* Account for navbar */
    }
    .join-card {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Custom File Upload Styling */
    .upload-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sys-spacing-24);
      grid-column: span 2;
    }

    .file-upload-wrapper {
      position: relative;
    }

    .file-input {
      position: absolute;
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      z-index: -1;
    }

    .file-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sys-spacing-32) var(--sys-spacing-16);
      background-color: var(--sys-color-surface-container-lowest);
      border: 2px dashed rgba(193, 198, 214, 0.4);
      border-radius: var(--sys-radius-lg);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      min-height: 160px;
    }

    .file-label:hover {
      border-color: var(--sys-color-primary);
      background-color: var(--sys-color-surface-container-low);
      transform: translateY(-2px);
    }

    .upload-icon {
      font-size: 2.5rem;
      color: var(--sys-color-primary);
      margin-bottom: var(--sys-spacing-12);
      opacity: 0.8;
    }

    .file-name-text {
      font-size: 0.875rem;
      color: var(--sys-color-on-surface-variant);
      margin-top: 8px;
      word-break: break-all;
    }

    .upload-title {
      font-weight: 700;
      color: var(--sys-color-on-surface);
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .upload-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="join-container">
    <div class="card join-card glass-panel">
      <div class="text-center mb-4">
        <h1 class="display-text" style="color: var(--sys-color-primary);">طلب الانضمام كطبيب</h1>
        <p class="body-md">نرحب بانضمامك لشبكة أطبائنا المعتمدين لخدمة المرضى وتقديم رعاية صحية أفضل.</p>
      </div>

      <form id="joinDoctorForm">
        <div class="grid grid-cols-2">
          
          <div class="form-group">
            <label for="full_name" class="form-label">الاسم الكامل المطابق للهوية</label>
            <input type="text" id="full_name" class="form-control" placeholder="مثال: د. أحمد محمد صالح" required>
          </div>

          <div class="form-group">
            <label for="specialty" class="form-label">التخصص الدقيق</label>
            <input type="text" id="specialty" class="form-control" placeholder="مثال: استشاري أمراض قلب" required>
          </div>

          <div class="form-group">
            <label for="phone" class="form-label">رقم الهاتف (للتواصل الإداري)</label>
            <input type="tel" id="phone" class="form-control" placeholder="05XXXXXXXX" required>
          </div>

          <div class="form-group">
            <label for="experience_years" class="form-label">سنوات الخبرة كأخصائي أو استشاري</label>
            <input type="number" id="experience_years" class="form-control" min="0" placeholder="مثال: 5" required>
          </div>

          <div class="form-group" style="grid-column: span 2;">
            <label for="location" class="form-label">موقع العيادة أو المستشفى الأساسي</label>
            <input type="text" id="location" class="form-control" placeholder="أدخل اسم وعنوان المستشفى" required>
          </div>

          <div class="form-group" style="grid-column: span 2;">
            <label for="qualifications" class="form-label">المؤهلات العلمية</label>
            <textarea id="qualifications" class="form-control" rows="3" style="height:auto; padding:12px;" placeholder="أذكر درجاتك العلمية ومصادرها" required></textarea>
          </div>

          <!-- Custom Upload Section -->
          <div class="upload-grid">
            <div class="form-group file-upload-wrapper">
              <label class="form-label">المرفقات الثبوتية (CV/شهادات)</label>
              <input type="file" id="documents" class="file-input" accept=".pdf,.doc,.docx,image/*" required>
              <label for="documents" class="file-label">
                <i class="ph ph-file-pdf upload-icon"></i>
                <span class="upload-title">ارفع السيرة الذاتية</span>
                <span class="body-md">PDF, DOC (الحد الأقصى 5MB)</span>
                <span id="documents-name" class="file-name-text">لم يتم اختيار ملف</span>
              </label>
            </div>

            <div class="form-group file-upload-wrapper">
              <label class="form-label">الصورة الشخصية</label>
              <input type="file" id="personal_photo" class="file-input" accept="image/*">
              <label for="personal_photo" class="file-label">
                <i class="ph ph-user-circle upload-icon"></i>
                <span class="upload-title">ارفع صورتك الشخصية</span>
                <span class="body-md">JPG, PNG, WebP</span>
                <span id="personal_photo-name" class="file-name-text">لم يتم اختيار ملف</span>
              </label>
            </div>
          </div>

          <div class="form-group" style="grid-column: span 2;">
            <label for="bio" class="form-label">نبذة مهنية عنك (ستظهر للمرضى)</label>
            <textarea id="bio" class="form-control" rows="4" style="height:auto; padding:12px;" placeholder="اكتب نبذة مختصرة عن رؤيتك وخبراتك" required></textarea>
          </div>

        </div>

        <div class="mt-4 pb-4">
          <div id="joinError" class="text-danger mb-4" style="display:none; text-align:center;"></div>
          <div id="joinSuccess" class="text-center" style="display:none;">
            <i class="ph-fill ph-check-circle" style="color:#2E7D32; font-size: 3rem;"></i>
            <h3 style="color:#2E7D32; margin-top:8px;">تم إرسال طلبك بنجاح!</h3>
            <p class="body-md">سيقوم فريقنا بمراجعة وثائقك والتواصل معك قريباً.</p>
            <a href="index.html" class="btn btn-outline mt-4">العودة للرئيسية</a>
          </div>
          
          <button type="submit" class="btn btn-primary btn-large" style="width: 100%;" id="btnJoinDoc">
            إرسال طلب الانضمام
          </button>
        </div>
      </form>

    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./components/toast.js"></script>
  <script src="./components/navbar.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
