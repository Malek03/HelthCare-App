<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | المنصة الطبية</title>
  
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sys-spacing-24);
      background: var(--sys-color-surface-container-lowest);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--sys-spacing-32);
    }
  </style>

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a237e">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="auth-container mt-4">
    <div class="card auth-card glass-panel">
      <div class="auth-header">
        <div style="font-size: 3rem; color: var(--sys-color-primary); margin-bottom: 16px;">
          <i class="ph-fill ph-heartbeat"></i>
        </div>
        <h1 class="headline-md">مرحباً بعودتك</h1>
        <p class="body-md">سجل دخولك لمتابعة استشاراتك وصحتك</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-control" placeholder="أدخل بريدك الإلكتروني" required>
        </div>
        
        <div class="form-group mb-4">
          <label for="password" class="form-label">كلمة المرور</label>
          <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="btnLogin">
          تسجيل الدخول
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="body-md">ليس لديك حساب؟ <a href="register.html" style="color: var(--sys-color-primary); font-weight: 600; text-decoration: none;">سجل الآن</a></p>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./components/navbar.js"></script>
  <script src="./js/auth.js"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('Service Worker registered!', reg);
          }).catch(err => {
            console.log('Service Worker registration failed: ', err);
          });
        });
      }
    </script>

</body>
</html>
